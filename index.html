<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KARISHMA HOME MADE 🍛</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#fff8f0;
color:#333;
}

header{
background:#c0392b;
color:white;
padding:15px 8%;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
}

.logo{font-size:24px;font-weight:700;}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

.hero{
padding:60px 20px;
text-align:center;
background:linear-gradient(135deg,#fff3e0,#ffffff);
}

.btn{
display:inline-block;
padding:12px 20px;
background:#c0392b;
color:white;
border:none;
text-decoration:none;
border-radius:8px;
font-weight:600;
margin:5px;
cursor:pointer;
}

.section{padding:60px 8%;}

.title{
text-align:center;
font-size:34px;
margin-bottom:40px;
color:#c0392b;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.08);
position:relative;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
}

.price{color:#27ae60;font-size:18px;font-weight:bold;margin:10px 0;}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:22px;
text-decoration:none;
}

/* CART BOX */
#cartBox{
position:fixed;
bottom:90px;
right:20px;
background:white;
padding:15px;
width:260px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
z-index:999;
}
</style>
</head>

<body>

<header>
<div class="logo">🍛 KARISHMA HOME MADE</div>
<nav>
<a href="#menu">Menu</a>
<a href="#order">Order</a>
<a href="#contact">Contact</a>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<img src="myphoto.jpg.jpg" style="width:150px;height:150px;border-radius:50%;object-fit:cover;">
<h1>Authentic Homemade Food</h1>
<p>Fresh • Hygienic • Home Delivered</p>

<a href="https://wa.me/919864856051" class="btn">WhatsApp Order</a>
<a href="upi.html" class="btn">Pay Online 💳</a>
</section>

<!-- CART BOX -->
<div id="cartBox">
<h3>🛒 Cart</h3>
<div id="cartItems"></div>
<p id="total">Total: ₹0</p>
<button class="btn" onclick="checkout()">Checkout</button>
</div>

<!-- MENU -->
<section class="section" id="menu">
<h2 class="title">Menu 🍽️</h2>

<div class="grid">

<div class="card">
<img src="biryani.jpg.jpg">
<h3>Chicken Biryani</h3>
<p class="price">₹180</p>
<button class="btn" onclick="addToCart('Chicken Biryani',180)">Add to Cart</button>
</div>

<div class="card">
<img src="butter-chicken.jpg.jpg">
<h3>Butter Chicken</h3>
<p class="price">₹220</p>
<button class="btn" onclick="addToCart('Butter Chicken',220)">Add to Cart</button>
</div>

<div class="card">
<img src="paneer.jpg.jpg">
<h3>Paneer Masala</h3>
<p class="price">₹160</p>
<button class="btn" onclick="addToCart('Paneer Masala',160)">Add to Cart</button>
</div>

</div>
</section>

<!-- CONTACT -->
<section class="section" id="contact">
<h2 class="title">Contact</h2>
<p>📞 9864856051</p>
</section>

<a class="whatsapp" href="https://wa.me/919864856051">💬</a>

<script>
let cart = [];

function addToCart(name, price){
cart.push({name,price});
updateCart();
}

function updateCart(){
let box = document.getElementById("cartItems");
let total = 0;

box.innerHTML = "";

cart.forEach(item=>{
total += item.price;
box.innerHTML += `<p>${item.name} - ₹${item.price}</p>`;
});

document.getElementById("total").innerText = "Total: ₹" + total;
}

function checkout(){
let msg = "🛒 Order:%0A";
let total = 0;

cart.forEach(i=>{
msg += i.name + " - ₹" + i.price + "%0A";
total += i.price;
});

msg += "%0ATotal: ₹" + total;

window.open("https://wa.me/919864856051?text=" + msg,"_blank");
}
</script>

</body>
</html>
